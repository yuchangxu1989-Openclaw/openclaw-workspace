# P2E Gate Criteria - 准出门控标准
# Runner 可直接消费此文件进行 GO/NO-GO 决策
# Version: 1.0.0

spec_version: "1.0.0"
gate_id: "p2e-gate-v1"

# ─── 评测结论判定规则 ─────────────────────────────────────────
verdict_rules:

  SUCCESS:
    description: "完全通过，允许直接发布"
    conditions:
      - p2e_score_gte: 0.85
      - hard_gate_failures_eq: 0
      - regression_failures_eq: 0
    release_action: "RELEASE"

  PARTIAL:
    description: "部分通过，允许降级发布，需记录缺陷"
    conditions:
      - p2e_score_gte: 0.60
      - hard_gate_failures_eq: 0
    release_action: "PARTIAL_RELEASE"
    requirements:
      - create_defect_tickets: true
      - notify_owner: true
      - set_monitoring_alert: true

  FAIL:
    description: "失败，阻断发布，触发修复流程"
    conditions:
      - any:
          - p2e_score_lt: 0.60
          - hard_gate_failures_gt: 0
    release_action: "BLOCK"
    requirements:
      - create_badcase_records: true
      - trigger_dto_repair: true
      - notify_owner: true
      - block_release: true

  SKIP:
    description: "意图非P2E类型，退出P2E轨道，转入标准执行"
    conditions:
      - intent_type_in: ["DIRECTIVE"]
    release_action: "SKIP"

# ─── 强制 Gate 项（任一失败 → FAIL）─────────────────────────
hard_gates:

  - gate_id: "hg-001"
    name: "意图类型识别"
    check: "intent.type_classification"
    failure_condition: "score < 0.90"
    failure_message: "意图类型识别准确率不足90%，无法可靠进入P2E轨道"

  - gate_id: "hg-002"
    name: "ISC规则草案生成"
    check: "isc.draft_generation"
    failure_condition: "result == null OR result == empty"
    failure_message: "ISC未能从意图生成任何规则草案"

  - gate_id: "hg-003"
    name: "DTO DAG有效性"
    check: "dto.dag_validity"
    failure_condition: "has_cycle == true OR missing_nodes == true"
    failure_message: "DTO生成的任务DAG存在循环依赖或缺失节点"

  - gate_id: "hg-004"
    name: "AEO轨道选择"
    check: "aeo.track_selection"
    failure_condition: "track != 'ai-effect'"
    failure_message: "P2E类意图未使用AI效果评测轨道"

  - gate_id: "hg-005"
    name: "功能测试通过"
    check: "test.functional_pass"
    failure_condition: "pass_rate < 1.0"
    failure_message: "功能测试未完全通过"

  - gate_id: "hg-006"
    name: "边界安全"
    check: "test.boundary_safety"
    failure_condition: "crash_occurred == true"
    failure_message: "边界输入导致系统崩溃"

  - gate_id: "hg-007"
    name: "回归干净"
    check: "test.regression_clean"
    failure_condition: "regression_failures > 0"
    failure_message: "新规则破坏了既有规则，回归测试失败"

  - gate_id: "hg-008"
    name: "发布原子性"
    check: "release.atomicity"
    failure_condition: "partial_deploy_detected == true"
    failure_message: "规则发布不具备原子性，存在部分部署状态"

  - gate_id: "hg-009"
    name: "版本追踪"
    check: "release.version_tracked"
    failure_condition: "version_recorded == false"
    failure_message: "发布版本未被记录，无法回滚"

# ─── 柔性 Gate 项（失败降级为 PARTIAL）─────────────────────
soft_gates:

  - gate_id: "sg-001"
    name: "意图多目标覆盖"
    check: "intent.multi_intent_coverage"
    failure_condition: "recall < 0.80"
    failure_message: "多意图场景下存在遗漏，覆盖率不足80%"

  - gate_id: "sg-002"
    name: "ISC置信度校准"
    check: "isc.confidence_calibration"
    failure_condition: "calibration_accuracy < 0.85"
    failure_message: "ISC置信度评估不准确，可能导致低质量规则进入自动通道"

  - gate_id: "sg-003"
    name: "DTO降级策略覆盖"
    check: "dto.fallback_exists"
    failure_condition: "fallback_coverage < 1.0"
    failure_message: "部分DTO任务缺少失败降级策略"

  - gate_id: "sg-004"
    name: "AEO评测覆盖完整性"
    check: "aeo.coverage_completeness"
    failure_condition: "sub_rule_coverage < 0.90"
    failure_message: "AEO未覆盖所有展开的子规则（覆盖率<90%）"

  - gate_id: "sg-005"
    name: "LEP执行ID唯一性"
    check: "lep.exec_id_uniqueness"
    failure_condition: "id_unique_rate < 1.0"
    failure_message: "LEP执行ID存在重复，全链路追踪受损"

  - gate_id: "sg-006"
    name: "LEP WAL日志完整"
    check: "lep.wal_completeness"
    failure_condition: "wal_record_exists == false"
    failure_message: "LEP执行WAL日志缺失，无法追溯执行历史"

  - gate_id: "sg-007"
    name: "端到端延迟P95"
    check: "test.latency_p95"
    failure_condition: "latency_p95_ms > 30000"
    failure_message: "端到端链路延迟P95超过30秒阈值"

  - gate_id: "sg-008"
    name: "变更通知发送"
    check: "release.notification_sent"
    failure_condition: "notification_delivery_rate < 1.0"
    failure_message: "规则发布变更通知未完全送达"

# ─── 顾问 Gate（仅记录，不影响结论）──────────────────────────
advisory_gates:

  - gate_id: "ag-001"
    name: "CRAS知识入库"
    check: "cras.knowledge_ingestion"
    failure_message: "意图未被CRAS纳入知识库，影响长期学习效果"

  - gate_id: "ag-002"
    name: "CRAS建议相关性"
    check: "cras.suggestion_relevance"
    failure_condition: "relevance_score < 0.70"
    failure_message: "CRAS生成的建议与意图相关性不足70%"

  - gate_id: "ag-003"
    name: "CRAS历史关联"
    check: "cras.historical_linking"
    failure_condition: "historical_recall < 0.60"
    failure_message: "CRAS未有效关联历史类似意图"

  - gate_id: "ag-004"
    name: "LEP故障修复联动"
    check: "lep.dto_failure_linkage"
    failure_condition: "repair_triggered_rate < 0.85"
    failure_message: "LEP执行失败时DTO修复流程触发率不足85%"

  - gate_id: "ag-005"
    name: "事件优先级排序"
    check: "event.priority_ordering"
    failure_message: "事件优先级排序不符合 VERDICT > CONSTRAINT > PRINCIPLE > GOAL"

# ─── 特殊规则 ─────────────────────────────────────────────────
special_rules:

  - id: "sr-001"
    name: "静默失败零容忍"
    description: "如果全链路无错误日志但意图未被执行，直接判 FAIL（不论总分）"
    detection:
      - "pipeline_complete == false AND no_error_logged == true"
    action: "FORCE_FAIL"
    message: "检测到静默失败：系统未执行意图也未报告任何错误"

  - id: "sr-002"
    name: "安全风险人工确认"
    description: "涉及降低安全级别的意图必须标注人工确认要求，否则自动降级"
    detection:
      - "intent_risk_level == HIGH AND human_approval_required == false"
    action: "FORCE_PARTIAL"
    message: "高风险裁决未标注人工确认要求，强制降级为PARTIAL"

  - id: "sr-003"
    name: "回归破坏零容忍"
    description: "新规则破坏既有规则，无论总分多高，均为 FAIL"
    detection:
      - "regression_failures > 0"
    action: "FORCE_FAIL"
    message: "回归测试失败：新规则破坏了既有规则"

# ─── 准出指标 KPI ─────────────────────────────────────────────
kpi_targets:
  intent_classification_accuracy: 0.90
  e2e_success_rate: 0.75
  latency_p95_ms: 30000
  silent_failure_rate: 0.01
  regression_failure_rate: 0.00
  badcase_attribution_rate: 0.95

# ─── 通知配置 ─────────────────────────────────────────────────
notifications:
  on_fail:
    channels: ["feishu"]
    include: ["failing_gates", "badcase_summary", "repair_suggestions"]
  on_partial:
    channels: ["feishu"]
    include: ["soft_gate_failures", "defect_list"]
  on_success:
    channels: ["feishu"]
    include: ["p2e_score", "release_version"]
