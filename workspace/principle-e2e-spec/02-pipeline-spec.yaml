# P2E Pipeline Specification
# Machine-readable pipeline definition for runner consumption
# Version: 1.0.0

spec_version: "1.0.0"
track_id: "p2e-e2e"
track_name: "言出法随 E2E / Principle-to-Enforcement E2E"
description: "高阶原则/裁决/约束/目标类意图的自治展开评测轨道"

# ─── 意图类型注册 ─────────────────────────────────────────────
intent_types:
  - id: PRINCIPLE
    description: "抽象规范，长期有效"
    examples:
      - "所有输出必须有溯源记录"
      - "技能修改后必须跑lint"
    p2e_eligible: true

  - id: VERDICT
    description: "一次性裁决，触发规则变更"
    examples:
      - "议会决定：ISC命名规范全自动执行"
    p2e_eligible: true

  - id: CONSTRAINT
    description: "边界条件，限制某类行为"
    examples:
      - "LLM调用失败率超10%必须告警"
      - "子Agent数量不能超过5个"
    p2e_eligible: true

  - id: GOAL
    description: "方向性目标，需系统自主分解"
    examples:
      - "让所有技能的测试覆盖率达到80%"
    p2e_eligible: true

  - id: DIRECTIVE
    description: "明确执行指令（非P2E主要关注）"
    examples:
      - "重启gateway"
    p2e_eligible: false

# ─── 管道阶段定义 ─────────────────────────────────────────────
pipeline:
  stages:

    - id: intent
      name: "INTENT 意图理解"
      order: 1
      gate_type: HARD
      weight: 0.20
      input_schema: "raw_utterance"
      output_schema: "intent_object"
      timeout_ms: 5000

      checks:
        - id: intent.type_classification
          description: "意图类型识别正确"
          type: FUNCTIONAL
          gate: HARD
          threshold: 0.90
          metric: classification_accuracy

        - id: intent.target_extraction
          description: "target实体完整提取"
          type: FUNCTIONAL
          gate: HARD
          threshold: 0.85
          metric: extraction_f1

        - id: intent.p2e_discrimination
          description: "P2E意图与普通指令正确区分"
          type: FUNCTIONAL
          gate: HARD
          threshold: 0.95
          metric: binary_accuracy

        - id: intent.multi_intent_coverage
          description: "多意图场景下全部提取"
          type: FUNCTIONAL
          gate: SOFT
          threshold: 0.80
          metric: recall

    - id: event
      name: "EVENT 事件发布"
      order: 2
      gate_type: SOFT
      weight: 0.05
      depends_on: [intent]
      input_schema: "intent_object"
      output_schema: "event_message"
      timeout_ms: 2000

      checks:
        - id: event.type_mapping
          description: "事件类型与意图类型正确映射"
          type: FUNCTIONAL
          gate: SOFT
          threshold: 1.0
          metric: exact_match

        - id: event.routing_accuracy
          description: "事件路由到正确订阅者"
          type: FUNCTIONAL
          gate: SOFT
          threshold: 1.0
          metric: routing_hit_rate

        - id: event.priority_ordering
          description: "优先级设置：VERDICT > CONSTRAINT > PRINCIPLE > GOAL"
          type: FUNCTIONAL
          gate: ADVISORY
          threshold: 1.0
          metric: ordering_correct

        - id: event.idempotency
          description: "相同意图不产生重复事件"
          type: FUNCTIONAL
          gate: SOFT
          threshold: 1.0
          metric: dedup_rate

    - id: isc
      name: "ISC 智能标准中心"
      order: 3
      gate_type: HARD
      weight: 0.25
      depends_on: [event]
      input_schema: "event_message"
      output_schema: "isc_rule_draft"
      timeout_ms: 10000

      checks:
        - id: isc.draft_generation
          description: "从意图自动生成标准草案（非空）"
          type: FUNCTIONAL
          gate: HARD
          threshold: 1.0
          metric: non_null_rate

        - id: isc.id_semantic
          description: "草案ID符合语义化格式 <domain>.<scope>.<desc>"
          type: FORMAT
          gate: HARD
          threshold: 1.0
          metric: regex_match
          params:
            pattern: "^[a-z][a-z0-9]*\\.[a-z][a-z0-9_-]*\\.[a-z][a-z0-9_-]+$"

        - id: isc.conflict_detection
          description: "与已有规则冲突被正确检测"
          type: FUNCTIONAL
          gate: HARD
          threshold: 0.95
          metric: conflict_recall

        - id: isc.confidence_calibration
          description: "置信度评估合理（高置信→自动，低置信→人工确认）"
          type: FUNCTIONAL
          gate: SOFT
          threshold: 0.85
          metric: calibration_accuracy

        - id: isc.lineage_completeness
          description: "血缘追踪字段完整（source意图可溯源）"
          type: FORMAT
          gate: SOFT
          threshold: 1.0
          metric: field_presence
          params:
            required_fields: [source_intent_id, created_from, created_at]

    - id: dto
      name: "DTO 声明式任务编排"
      order: 4
      gate_type: HARD
      weight: 0.20
      depends_on: [isc]
      input_schema: "isc_rule"
      output_schema: "task_dag"
      timeout_ms: 8000

      checks:
        - id: dto.auto_subscription
          description: "规则自动订阅（无需人工注册）"
          type: FUNCTIONAL
          gate: HARD
          threshold: 1.0
          metric: auto_sub_rate

        - id: dto.dag_validity
          description: "DAG无循环依赖、无遗漏节点"
          type: FUNCTIONAL
          gate: HARD
          threshold: 1.0
          metric: dag_is_valid

        - id: dto.trigger_correctness
          description: "触发条件与意图语义一致"
          type: SEMANTIC
          gate: HARD
          threshold: 0.90
          metric: semantic_alignment_score

        - id: dto.fallback_exists
          description: "失败场景降级策略存在"
          type: FUNCTIONAL
          gate: SOFT
          threshold: 1.0
          metric: fallback_coverage

    - id: cras
      name: "CRAS 认知进化伙伴"
      order: 5
      gate_type: ADVISORY
      weight: 0.05
      depends_on: [dto]
      input_schema: "execution_data"
      output_schema: "insight_report"
      timeout_ms: 15000

      checks:
        - id: cras.knowledge_ingestion
          description: "意图被纳入知识库（可检索）"
          type: FUNCTIONAL
          gate: ADVISORY
          threshold: 1.0
          metric: retrieval_hit

        - id: cras.suggestion_relevance
          description: "生成建议与意图相关（非泛化）"
          type: SEMANTIC
          gate: ADVISORY
          threshold: 0.70
          metric: relevance_score

        - id: cras.historical_linking
          description: "历史类似意图被关联引用"
          type: FUNCTIONAL
          gate: ADVISORY
          threshold: 0.60
          metric: historical_recall

    - id: aeo
      name: "AEO 智能体效果运营"
      order: 6
      gate_type: SOFT
      weight: 0.15
      depends_on: [dto]
      input_schema: "execution_result"
      output_schema: "evaluation_report"
      timeout_ms: 20000

      checks:
        - id: aeo.track_selection
          description: "P2E类使用AI效果轨道"
          type: FUNCTIONAL
          gate: HARD
          threshold: 1.0
          metric: track_correct

        - id: aeo.coverage_completeness
          description: "意图展开的所有子规则均被评测"
          type: FUNCTIONAL
          gate: SOFT
          threshold: 0.90
          metric: sub_rule_coverage

        - id: aeo.semantic_alignment
          description: "评测标准与原始意图语义对齐"
          type: SEMANTIC
          gate: SOFT
          threshold: 0.80
          metric: semantic_alignment_score

        - id: aeo.decision_traceable
          description: "准入决策可溯源到具体评测维度"
          type: FUNCTIONAL
          gate: SOFT
          threshold: 1.0
          metric: traceability_rate

    - id: lep
      name: "LEP 韧性执行中心"
      order: 7
      gate_type: SOFT
      weight: 0.10
      depends_on: [dto]
      input_schema: "task_dag"
      output_schema: "execution_record"
      timeout_ms: 30000

      checks:
        - id: lep.exec_id_uniqueness
          description: "执行ID唯一且贯穿全链路"
          type: FUNCTIONAL
          gate: SOFT
          threshold: 1.0
          metric: id_unique_rate

        - id: lep.retry_on_failure
          description: "失败自动重试（策略正确）"
          type: FUNCTIONAL
          gate: SOFT
          threshold: 1.0
          metric: retry_triggered

        - id: lep.wal_completeness
          description: "执行WAL日志完整"
          type: FUNCTIONAL
          gate: SOFT
          threshold: 1.0
          metric: wal_record_exists

        - id: lep.dto_failure_linkage
          description: "执行失败时触发DTO修复流程"
          type: FUNCTIONAL
          gate: ADVISORY
          threshold: 0.85
          metric: repair_triggered_rate

    - id: test
      name: "TEST 测试验证"
      order: 8
      gate_type: HARD
      weight: 0.00  # 纯验证层，不计入评分，但HARD门控
      depends_on: [lep, aeo]
      input_schema: "execution_record"
      output_schema: "test_report"
      timeout_ms: 60000

      checks:
        - id: test.functional_pass
          description: "功能测试：规则被正确执行"
          type: FUNCTIONAL
          gate: HARD
          threshold: 1.0
          metric: test_pass_rate

        - id: test.boundary_safety
          description: "边界输入下系统不崩溃"
          type: SAFETY
          gate: HARD
          threshold: 1.0
          metric: no_crash_rate

        - id: test.regression_clean
          description: "新规则不破坏既有规则"
          type: REGRESSION
          gate: HARD
          threshold: 1.0
          metric: regression_pass_rate

        - id: test.latency_p95
          description: "端到端链路延迟P95 ≤ 30s"
          type: PERFORMANCE
          gate: SOFT
          threshold: 30000
          metric: latency_p95_ms
          comparison: lte

    - id: gate
      name: "GATE 准出门控"
      order: 9
      gate_type: HARD
      weight: 0.00  # 综合决策层
      depends_on: [test]
      input_schema: "all_stage_results"
      output_schema: "gate_decision"
      timeout_ms: 5000

      decision_logic:
        SUCCESS:
          condition: "p2e_score >= 0.85 AND hard_gate_failures == 0"
        PARTIAL:
          condition: "p2e_score >= 0.60 AND hard_gate_failures == 0"
        FAIL:
          condition: "p2e_score < 0.60 OR hard_gate_failures > 0"

    - id: release
      name: "RELEASE 发布"
      order: 10
      gate_type: HARD
      weight: 0.00
      depends_on: [gate]
      condition: "gate.decision == SUCCESS OR gate.decision == PARTIAL"
      input_schema: "gate_decision"
      output_schema: "release_record"
      timeout_ms: 10000

      checks:
        - id: release.atomicity
          description: "规则激活原子性（全成功或全回滚）"
          type: FUNCTIONAL
          gate: HARD
          threshold: 1.0
          metric: atomic_deploy_rate

        - id: release.notification_sent
          description: "变更通知发送到相关订阅者"
          type: FUNCTIONAL
          gate: SOFT
          threshold: 1.0
          metric: notification_delivery_rate

        - id: release.version_tracked
          description: "版本可追踪（支持回滚）"
          type: FUNCTIONAL
          gate: HARD
          threshold: 1.0
          metric: version_recorded

# ─── 评分权重汇总 ─────────────────────────────────────────────
scoring:
  stage_weights:
    intent: 0.20
    isc: 0.25
    dto: 0.20
    aeo: 0.15
    lep: 0.10
    cras: 0.05
    event: 0.05
  thresholds:
    success: 0.85
    partial: 0.60
    fail: 0.00

# ─── 全局超时 ─────────────────────────────────────────────────
global:
  max_total_timeout_ms: 120000
  silent_failure_detection: true
  silent_failure_threshold_ms: 90000
