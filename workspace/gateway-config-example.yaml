# OpenClaw Gateway 完整配置示例
# 格式：YAML (OpenClaw 实际使用 JSON5，此 YAML 版本用于说明)
# 配置文件位置：~/.openclaw/openclaw.json

# =============================================================================
# 1. 基础配置 (Gateway Core Configuration)
# =============================================================================

# 网关服务器设置
gateway:
  mode: "local"                    # 运行模式：local | remote
  port: 18789                      # 网关监听端口
  bind: "loopback"                 # 绑定地址：loopback (127.0.0.1) | all (0.0.0.0)
  
  # 认证配置
  auth:
    mode: "token"                  # 认证模式：token | tailscale
    token: "${OPENCLAW_GATEWAY_TOKEN}"  # 支持环境变量引用
  
  # 配置热重载
  reload:
    mode: "hybrid"                 # 重载模式：hybrid | hot | restart | off
    debounceMs: 300                # 防抖延迟（毫秒）
  
  # 控制 UI
  controlUi:
    enabled: true                  # 启用 Web 控制界面
    basePath: "/openclaw"          # 访问路径

# =============================================================================
# 2. 身份配置 (Identity)
# =============================================================================

identity:
  name: "OpenClaw Assistant"       # 助手名称
  theme: "helpful assistant"       # 主题描述
  emoji: "🦞"                      # 签名表情

# =============================================================================
# 3. 日志配置 (Logging)
# =============================================================================

logging:
  level: "info"                    # 日志级别：debug | info | warn | error
  file: "~/.openclaw/logs/openclaw.log"  # 日志文件路径
  consoleLevel: "info"             # 控制台日志级别
  consoleStyle: "pretty"           # 控制台样式：pretty | json
  redactSensitive: "tools"         # 脱敏敏感信息：tools | all | none

# =============================================================================
# 4. 代理配置 (Agent Configuration)
# =============================================================================

agents:
  # 默认配置
  defaults:
    workspace: "~/.openclaw/workspace"  # 工作目录
    
    # 时区设置
    userTimezone: "Asia/Shanghai"       # 用户时区
    timeFormat: "auto"                  # 时间格式：auto | 12 | 24
    
    # 模型配置
    model:
      primary: "anthropic/claude-sonnet-4-5"  # 主模型
      fallbacks:                              # 故障转移模型列表
        - "anthropic/claude-opus-4-6"
        - "openai/gpt-5.2"
    
    # 图像模型
    imageModel:
      primary: "openrouter/anthropic/claude-sonnet-4-5"
      fallbacks:
        - "openrouter/google/gemini-2.0-flash-vision:free"
    
    # 模型别名（用于 /model 命令快速切换）
    models:
      "anthropic/claude-opus-4-6":
        alias: "opus"
      "anthropic/claude-sonnet-4-5":
        alias: "sonnet"
      "openai/gpt-5.2":
        alias: "gpt"
      "openai/gpt-5-mini":
        alias: "gpt-mini"
    
    # 思考模式默认值
    thinkingDefault: "low"         # 思考级别：off | low | medium | high
    verboseDefault: "off"          # 详细输出：on | off
    elevatedDefault: "on"          # 提升权限：on | off
    
    # 超时和并发
    timeoutSeconds: 600            # 单次任务超时（秒）
    maxConcurrent: 3               # 最大并发运行数
    mediaMaxMb: 5                  # 媒体文件大小限制（MB）
    
    # 心跳配置（定期主动检查）
    heartbeat:
      every: "30m"                 # 心跳间隔：0m 禁用 | 30m | 2h 等
      target: "last"               # 发送目标：last | whatsapp | telegram | discord | none
      prompt: "HEARTBEAT"          # 心跳提示词
      directPolicy: "allow"        # DM 策略：allow | block
    
    # 沙箱配置（Docker 隔离）
    sandbox:
      mode: "non-main"             # 沙箱模式：off | non-main | all
      scope: "agent"               # 沙箱范围：session | agent | shared
      docker:
        image: "openclaw-sandbox:bookworm-slim"
        network: "none"            # 网络隔离
        readOnlyRoot: true         # 只读根文件系统

# 多代理配置（可选）
# agents:
#   list:
#     - id: "home"
#       default: true
#       workspace: "~/.openclaw/workspace-home"
#     - id: "work"
#       workspace: "~/.openclaw/workspace-work"

# =============================================================================
# 5. 通道配置 (Channel Configuration)
# =============================================================================

channels:
  # 通道默认设置
  defaults:
    groupPolicy: "allowlist"       # 群组策略默认值：open | allowlist | disabled
    heartbeat:
      showOk: false                # 显示健康状态
      showAlerts: true             # 显示告警状态
      useIndicator: true           # 使用紧凑指示器格式

  # -------------------------------------------------------------------------
  # 5.1 Feishu (飞书) 配置
  # -------------------------------------------------------------------------
  feishu:
    enabled: true                  # 启用飞书通道
    domain: "feishu"               # API 域：feishu (国内) | lark (国际)
    connectionMode: "websocket"    # 连接模式：websocket | webhook
    
    # 账户配置（支持多账户）
    accounts:
      main:
        appId: "cli_xxxxxxxxxxxxxx"           # 飞书应用 ID
        appSecret: "${FEISHU_APP_SECRET}"     # 飞书应用密钥（支持环境变量）
        botName: "OpenClaw Assistant"         # 机器人名称
        typingIndicator: true                 # 显示输入状态
        resolveSenderNames: true              # 解析发送者名称
    
    # DM 策略
    dmPolicy: "pairing"            # pairing | allowlist | open | disabled
    allowFrom:                     # DM 白名单（飞书 open_id，格式：ou_xxx）
      - "ou_xxxxxxxxxxxxxx"
    
    # 群组配置
    groupPolicy: "allowlist"       # 群组访问策略
    groupAllowFrom:                # 允许的群组 ID 列表（飞书 chat_id，格式：oc_xxx）
      - "oc_xxxxxxxxxxxxxx"
    
    # 群组详细配置
    groups:
      "oc_xxxxxxxxxxxxxx":
        requireMention: true       # 是否需要 @提及
        allowFrom:                 # 群组内允许的用户列表
          - "ou_user1xxxxxxxxxxxx"
          - "ou_user2xxxxxxxxxxxx"
    
    # 消息限制
    textChunkLimit: 2000           # 文本分块大小（字符）
    mediaMaxMb: 30                 # 媒体文件大小限制（MB）
    
    # 流式输出
    streaming: true                # 启用流式卡片输出
    blockStreaming: true           # 启用块级流式

  # -------------------------------------------------------------------------
  # 5.2 Telegram 配置
  # -------------------------------------------------------------------------
  telegram:
    enabled: true                  # 启用 Telegram
    botToken: "${TELEGRAM_BOT_TOKEN}"  # Bot Token（来自 @BotFather）
    
    # DM 策略
    dmPolicy: "pairing"            # 默认配对模式
    allowFrom:                     # 允许的用户 ID（数字格式）
      - "tg:123456789"
      - "1234567890"
    
    # 群组配置
    groupPolicy: "allowlist"
    groupAllowFrom:                # 允许的群组 ID
      - "-1001234567890"
    
    groups:
      "-1001234567890":
        requireMention: true       # 需要 @提及
        allowFrom:                 # 群组内允许的管理员
          - "@admin"
          - "123456789"
        systemPrompt: "保持回答简洁"  # 群组特定系统提示
    
    # 自定义命令菜单
    customCommands:
      - command: "backup"
        description: "执行 Git 备份"
      - command: "generate"
        description: "生成图像"
    
    # 高级选项
    historyLimit: 50               # 消息历史限制
    replyToMode: "first"           # 回复模式：off | first | all
    streaming: "partial"           # 流式输出：off | partial | block | progress
    mediaMaxMb: 5                  # 媒体文件大小限制
    proxy: "socks5://localhost:9050"  # 可选代理

  # -------------------------------------------------------------------------
  # 5.3 WhatsApp 配置
  # -------------------------------------------------------------------------
  whatsapp:
    # DM 策略
    dmPolicy: "pairing"            # 配对模式
    allowFrom:                     # 允许的电话号码（E.164 格式）
      - "+8613800138000"
      - "+15555550123"
    
    # 群组配置
    groupPolicy: "allowlist"
    groupAllowFrom:
      - "+8613800138000"
    
    groups:
      "*":                         # 所有群组
        requireMention: true       # 需要 @提及
    
    # 消息设置
    textChunkLimit: 4000           # 文本分块大小
    chunkMode: "length"            # 分块模式：length | newline
    mediaMaxMb: 50                 # 媒体文件大小限制
    sendReadReceipts: true         # 发送已读回执（蓝勾）
    
    # 多账户配置（可选）
    # accounts:
    #   default: {}
    #   personal: {}
    #   biz: {}

  # -------------------------------------------------------------------------
  # 5.4 Discord 配置
  # -------------------------------------------------------------------------
  discord:
    enabled: true
    token: "${DISCORD_BOT_TOKEN}"  # Discord Bot Token
    
    # DM 配置
    dmPolicy: "pairing"
    dm:
      enabled: true
      allowFrom:                   # 允许的用户 ID
        - "123456789012345678"
    
    # 服务器配置
    guilds:
      "123456789012345678":        # 服务器 ID
        slug: "my-server"          # 服务器别名
        requireMention: false      # 是否需要 @提及
        users:                     # 允许的用户
          - "987654321098765432"
        channels:
          general:                 # 频道名称或 ID
            allow: true
            requireMention: true
            systemPrompt: "仅简短回答"
          help:
            allow: true
            skills: ["docs"]       # 启用的技能
    
    # 高级选项
    allowBots: false               # 允许机器人消息
    historyLimit: 20               # 历史消息限制
    mediaMaxMb: 8                  # 媒体文件大小限制
    streaming: "off"               # 流式输出：off | partial | block | progress
    
    # 语音频道（可选）
    # voice:
    #   enabled: true
    #   autoJoin:
    #     - guildId: "123456789012345678"
    #       channelId: "234567890123456789"

  # -------------------------------------------------------------------------
  # 5.5 Slack 配置
  # -------------------------------------------------------------------------
  slack:
    enabled: true
    botToken: "xoxb-xxxxxxxxxxxx"     # Slack Bot Token
    appToken: "xapp-xxxxxxxxxxxx"     # Slack App Token (Socket Mode)
    
    # DM 配置
    dmPolicy: "pairing"
    dm:
      enabled: true
      allowFrom:
        - "U123456789"
    
    # 频道配置
    channels:
      "#general":
        allow: true
        requireMention: true
        allowBots: false
      "#engineering":
        allow: true
        requireMention: true
        users:
          - "U123456789"
        systemPrompt: "保持技术讨论简洁"
    
    # 斜杠命令
    slashCommand:
      enabled: true
      name: "openclaw"
      ephemeral: true            # 仅用户可见
    
    # 高级选项
    historyLimit: 50
    streaming: "partial"
    mediaMaxMb: 20

  # -------------------------------------------------------------------------
  # 5.6 Signal 配置
  # -------------------------------------------------------------------------
  signal:
    enabled: true
    account: "+8613800138000"    # Signal 账号（可选）
    
    dmPolicy: "pairing"
    allowFrom:
      - "+8613800138000"
      - "uuid:123e4567-e89b-12d3-a456-426614174000"
    
    historyLimit: 50
    reactionNotifications: "own" # off | own | all | allowlist

  # -------------------------------------------------------------------------
  # 5.7 Google Chat 配置
  # -------------------------------------------------------------------------
  googlechat:
    enabled: true
    serviceAccountFile: "/path/to/service-account.json"  # 服务账号 JSON 文件
    audienceType: "app-url"      # app-url | project-number
    audience: "https://gateway.example.com/googlechat"
    
    dm:
      enabled: true
      policy: "pairing"
      allowFrom:
        - "users/1234567890"
    
    groupPolicy: "allowlist"
    groups:
      "spaces/AAAA":
        allow: true
        requireMention: true
    
    mediaMaxMb: 20

# =============================================================================
# 6. 安全设置 (Security Configuration)
# =============================================================================

# 工具权限控制
tools:
  allow:                         # 允许的工具列表
    - "exec"                     # 执行 shell 命令
    - "process"                  # 进程管理
    - "read"                     # 读取文件
    - "write"                    # 写入文件
    - "edit"                     # 编辑文件
    - "apply_patch"              # 应用补丁
    - "web_search"               # 网络搜索
    - "web_fetch"                # 获取网页内容
  
  deny:                          # 禁止的工具列表
    - "browser"                  # 浏览器控制
    - "canvas"                   # 画布控制
  
  # exec 工具配置
  exec:
    backgroundMs: 10000          # 后台运行阈值（毫秒）
    timeoutSec: 1800             # 超时时间（秒）
    cleanupMs: 1800000           # 清理延迟（毫秒）
  
  # 提升权限配置（允许执行危险操作）
  elevated:
    enabled: true                # 启用提升权限
    allowFrom:                   # 允许的用户列表（按通道）
      whatsapp:
        - "+8613800138000"
      telegram:
        - "123456789"
      discord:
        - "123456789012345678"
      slack:
        - "U123456789"
      signal:
        - "+8613800138000"

# 命令控制
commands:
  native: "auto"                 # 注册原生命令：auto | true | false
  text: true                     # 解析文本中的 /commands
  bash: false                    # 允许 ! 命令（需要 elevated）
  bashForegroundMs: 2000         # 前台命令超时
  config: false                  # 允许 /config 修改配置
  debug: false                   # 允许 /debug 命令
  restart: false                 # 允许 /restart 重启网关
  
  # 命令访问控制
  allowFrom:
    "*":                         # 所有通道允许的用户
      - "admin_user_id"
    discord:                     # Discord 特定用户
      - "user:123456789012345678"
  
  useAccessGroups: true          # 使用访问组控制

# 会话管理
session:
  dmScope: "per-channel-peer"    # DM 会话范围：main | per-peer | per-channel-peer
  threadBindings:
    enabled: true                # 启用线程绑定
    idleHours: 24                # 空闲超时（小时）
    maxAgeHours: 0               # 最大年龄（0=禁用）
  
  # 会话重置
  reset:
    mode: "daily"                # 重置模式：daily | idle | never
    atHour: 4                    # 每日重置时间（小时）
    idleMinutes: 120             # 空闲重置阈值（分钟）
  
  resetTriggers:                 # 重置触发命令
    - "/new"
    - "/reset"
  
  # 会话存储维护
  maintenance:
    mode: "warn"                 # 维护模式：warn | auto
    pruneAfter: "30d"            # 修剪旧会话
    maxEntries: 500              # 最大条目数
    rotateBytes: "10mb"          # 轮转大小

# 消息格式
messages:
  messagePrefix: "[OpenClaw]"    # 消息前缀
  responsePrefix: ">"            # 响应前缀
  ackReaction: "👀"              # 确认反应
  ackReactionScope: "group-mentions"  # 反应范围
  
  # 群组聊天设置
  groupChat:
    historyLimit: 50             # 历史消息限制
    mentionPatterns:             # 提及模式（正则）
      - "@openclaw"
      - "openclaw"

# 路由和队列
routing:
  groupChat:
    mentionPatterns:
      - "@openclaw"
      - "openclaw"
    historyLimit: 50
  
  queue:
    mode: "collect"              # 队列模式：collect | immediate
    debounceMs: 1000             # 防抖延迟
    cap: 20                      # 队列容量
    drop: "summarize"            # 超限处理：summarize | drop

# =============================================================================
# 7. 认证配置 (Authentication Profiles)
# =============================================================================

auth:
  # 认证配置文件（敏感信息存储在 auth-profiles.json）
  profiles:
    "anthropic:default":
      provider: "anthropic"
      mode: "api_key"            # api_key | oauth
    "anthropic:work":
      provider: "anthropic"
      mode: "api_key"
    "openai:default":
      provider: "openai"
      mode: "api_key"
  
  # 认证配置文件使用顺序
  order:
    anthropic:
      - "anthropic:default"
      - "anthropic:work"
    openai:
      - "openai:default"

# =============================================================================
# 8. 模型提供商配置 (Model Providers)
# =============================================================================

models:
  mode: "merge"                  # 模式：merge | replace
  
  # 自定义提供商
  providers:
    "custom-proxy":
      baseUrl: "http://localhost:4000/v1"
      apiKey: "${CUSTOM_API_KEY}"
      api: "openai-responses"
      authHeader: true
      headers:
        "X-Proxy-Region": "us-west"
      models:
        - id: "llama-3.1-8b"
          name: "Llama 3.1 8B"
          api: "openai-responses"
          reasoning: false
          input: ["text"]
          cost:
            input: 0
            output: 0
          contextWindow: 128000
          maxTokens: 32000

# =============================================================================
# 9. 自动化配置 (Automation)
# =============================================================================

# Cron 定时任务
cron:
  enabled: true
  store: "~/.openclaw/cron/cron.json"
  maxConcurrentRuns: 2
  sessionRetention: "24h"        # 会话保留时间
  runLog:
    maxBytes: "2mb"
    keepLines: 2000

# Webhooks
hooks:
  enabled: true
  path: "/hooks"
  token: "${HOOKS_SHARED_SECRET}"
  defaultSessionKey: "hook:ingress"
  allowRequestSessionKey: false
  allowedSessionKeyPrefixes:
    - "hook:"
  
  mappings:
    - id: "gmail-hook"
      match:
        path: "gmail"
      action: "agent"
      agentId: "main"
      deliver: true
      channel: "last"
      to: "+8613800138000"

# =============================================================================
# 10. 技能配置 (Skills)
# =============================================================================

skills:
  allowBundled:                  # 允许的内置技能
    - "gemini"
    - "peekaboo"
    - "weather"
    - "healthcheck"
  
  # 额外技能目录
  load:
    extraDirs:
      - "~/Projects/agent-scripts/skills"
  
  # 技能安装偏好
  install:
    preferBrew: true
    nodeManager: "npm"
  
  # 技能条目配置
  entries:
    "nano-banana-pro":
      enabled: true
      apiKey: "${GEMINI_API_KEY}"
    "peekaboo":
      enabled: true

# =============================================================================
# 11. 工具媒体配置 (Media Tools)
# =============================================================================

tools:
  media:
    audio:
      enabled: true
      maxBytes: 20971520         # 20MB
      models:
        - provider: "openai"
          model: "gpt-4o-mini-transcribe"
      timeoutSeconds: 120
    
    video:
      enabled: true
      maxBytes: 52428800         # 50MB
      models:
        - provider: "google"
          model: "gemini-3-flash-preview"

# =============================================================================
# 12. 环境变量配置 (Environment Variables)
# =============================================================================

env:
  # 直接设置环境变量
  OPENROUTER_API_KEY: "sk-or-xxxxxxxxxxxxx"
  
  # 变量集合
  vars:
    GROQ_API_KEY: "gsk-xxxxxxxxxxxxx"
    GEMINI_API_KEY: "xxxxxxxxxxxxx"
    FEISHU_APP_SECRET: "xxxxxxxxxxxxx"
    TELEGRAM_BOT_TOKEN: "xxxxxxxxxxxxx"
    DISCORD_BOT_TOKEN: "xxxxxxxxxxxxx"
  
  # Shell 环境变量导入（可选）
  shellEnv:
    enabled: true
    timeoutMs: 15000

# =============================================================================
# 13. 多代理路由配置 (Multi-Agent Routing) - 可选
# =============================================================================

# bindings:
#   # 将特定 Feishu 用户路由到主代理
#   - agentId: "main"
#     match:
#       channel: "feishu"
#       peer:
#         kind: "direct"
#         id: "ou_xxxxxxxxxxxxxx"
#   
#   # 将特定 Telegram 群组路由到工作代理
#   - agentId: "work"
#     match:
#       channel: "telegram"
#       peer:
#         kind: "group"
#         id: "-1001234567890"
#   
#   # 将 WhatsApp 商务账号路由到商务代理
#   - agentId: "business"
#     match:
#       channel: "whatsapp"
#       accountId: "biz"

# =============================================================================
# 配置说明结束
# =============================================================================
# 
# 使用提示:
# 1. 实际配置文件应使用 JSON5 格式（~/.openclaw/openclaw.json）
# 2. 敏感信息建议使用环境变量引用（${VAR_NAME} 格式）
# 3. 可使用 openclaw onboard 交互式配置向导
# 4. 使用 openclaw doctor 检查配置有效性
# 5. 配置支持热重载，大多数更改无需重启网关
# 
# 常用命令:
# - openclaw gateway status     # 查看网关状态
# - openclaw gateway restart    # 重启网关
# - openclaw logs --follow      # 查看日志
# - openclaw pairing list       # 查看配对请求
# - openclaw pairing approve    # 批准配对
# - openclaw doctor             # 诊断配置问题
# =============================================================================
