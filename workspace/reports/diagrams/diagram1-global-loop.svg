<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="680" viewBox="0 0 900 680" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <!-- Background -->
  <rect width="900" height="680" fill="#F8FAFC" rx="12"/>
  
  <!-- Title -->
  <rect x="0" y="0" width="900" height="56" fill="#1E293B" rx="12"/>
  <rect x="0" y="44" width="900" height="12" fill="#1E293B"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#F1F5F9">OpenClaw 全局闭环总图</text>

  <!-- Layer 1: Input Layer -->
  <rect x="30" y="76" width="840" height="110" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5" rx="8"/>
  <text x="50" y="96" font-size="12" font-weight="bold" fill="#1D4ED8">L1 · 感知与输入层</text>
  
  <!-- User input box -->
  <rect x="60" y="105" width="130" height="60" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5" rx="6"/>
  <text x="125" y="130" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E40AF">用户/外部输入</text>
  <text x="125" y="148" text-anchor="middle" font-size="11" fill="#3B82F6">消息 / API / 定时</text>

  <!-- Intent recognition -->
  <rect x="220" y="105" width="145" height="60" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5" rx="6"/>
  <text x="292" y="128" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E40AF">意图识别</text>
  <text x="292" y="146" text-anchor="middle" font-size="11" fill="#3B82F6">Event Sense / NLU</text>

  <!-- Event Bus -->
  <rect x="395" y="105" width="145" height="60" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5" rx="6"/>
  <text x="467" y="128" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E40AF">EventBus</text>
  <text x="467" y="146" text-anchor="middle" font-size="11" fill="#3B82F6">events.jsonl 事件流</text>

  <!-- Config inputs -->
  <rect x="570" y="100" width="130" height="30" fill="#BFDBFE" stroke="#93C5FD" stroke-width="1" rx="4"/>
  <text x="635" y="119" text-anchor="middle" font-size="11" fill="#1D4ED8">openclaw.json 配置</text>
  <rect x="570" y="135" width="130" height="30" fill="#BFDBFE" stroke="#93C5FD" stroke-width="1" rx="4"/>
  <text x="635" y="154" text-anchor="middle" font-size="11" fill="#1D4ED8">ISC Rules 规则引擎</text>
  <rect x="720" y="105" width="120" height="60" fill="#BFDBFE" stroke="#93C5FD" stroke-width="1.5" rx="6"/>
  <text x="780" y="128" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E40AF">Cron 调度</text>
  <text x="780" y="146" text-anchor="middle" font-size="11" fill="#3B82F6">jobs.json 定时任务</text>

  <!-- Arrows L1 -->
  <line x1="190" y1="135" x2="218" y2="135" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="365" y1="135" x2="393" y2="135" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="540" y1="119" x2="568" y2="119" stroke="#93C5FD" stroke-width="1.5" marker-end="url(#arrowLBlue)"/>
  <line x1="540" y1="150" x2="568" y2="150" stroke="#93C5FD" stroke-width="1.5" marker-end="url(#arrowLBlue)"/>

  <!-- Layer 2: Governance Layer -->
  <rect x="30" y="200" width="840" height="125" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5" rx="8"/>
  <text x="50" y="220" font-size="12" font-weight="bold" fill="#15803D">L2 · 治理与决策层</text>

  <rect x="60" y="228" width="140" height="60" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5" rx="6"/>
  <text x="130" y="253" text-anchor="middle" font-size="13" font-weight="bold" fill="#14532D">ISC 治理门禁</text>
  <text x="130" y="271" text-anchor="middle" font-size="11" fill="#15803D">规则 / 过滤 / 鉴权</text>

  <rect x="230" y="228" width="140" height="60" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5" rx="6"/>
  <text x="300" y="253" text-anchor="middle" font-size="13" font-weight="bold" fill="#14532D">DTO 编排</text>
  <text x="300" y="271" text-anchor="middle" font-size="11" fill="#15803D">任务路由 / 参数绑定</text>

  <rect x="400" y="228" width="140" height="60" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5" rx="6"/>
  <text x="470" y="253" text-anchor="middle" font-size="13" font-weight="bold" fill="#14532D">Dispatcher</text>
  <text x="470" y="271" text-anchor="middle" font-size="11" fill="#15803D">分发 / 优先级排队</text>

  <rect x="570" y="228" width="140" height="60" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5" rx="6"/>
  <text x="640" y="253" text-anchor="middle" font-size="13" font-weight="bold" fill="#14532D">AEO 质量门禁</text>
  <text x="640" y="271" text-anchor="middle" font-size="11" fill="#15803D">评测 / 置信度 / 门限</text>

  <rect x="740" y="228" width="110" height="60" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5" rx="6"/>
  <text x="795" y="253" text-anchor="middle" font-size="13" font-weight="bold" fill="#14532D">Failover</text>
  <text x="795" y="271" text-anchor="middle" font-size="11" fill="#15803D">降级 / 备切</text>

  <!-- Arrows L1→L2 -->
  <line x1="467" y1="165" x2="200" y2="228" stroke="#3B82F6" stroke-width="2.5" stroke-dasharray="5,3" marker-end="url(#arrowBlue)"/>
  <!-- Arrows L2 internal -->
  <line x1="200" y1="258" x2="228" y2="258" stroke="#22C55E" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="370" y1="258" x2="398" y2="258" stroke="#22C55E" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="540" y1="258" x2="568" y2="258" stroke="#22C55E" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="710" y1="258" x2="738" y2="258" stroke="#22C55E" stroke-width="2" marker-end="url(#arrowGreen)"/>

