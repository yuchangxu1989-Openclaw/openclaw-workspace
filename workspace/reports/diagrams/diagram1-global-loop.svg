  <rect x="30" y="488" width="840" height="80" fill="#FDF4FF" stroke="#A855F7" stroke-width="1.5" rx="8"/>
  <text x="50" y="508" font-size="12" font-weight="bold" fill="#7E22CE">L4 · 反馈与进化层</text>

  <rect x="60" y="515" width="170" height="42" fill="#F3E8FF" stroke="#A855F7" stroke-width="1.5" rx="6"/>
  <text x="145" y="533" text-anchor="middle" font-size="12" font-weight="bold" fill="#6B21A8">执行结果 / 指标</text>
  <text x="145" y="549" text-anchor="middle" font-size="11" fill="#7E22CE">决策日志 / 成功率</text>

  <rect x="270" y="515" width="170" height="42" fill="#F3E8FF" stroke="#A855F7" stroke-width="1.5" rx="6"/>
  <text x="355" y="533" text-anchor="middle" font-size="12" font-weight="bold" fill="#6B21A8">PDCA 复盘</text>
  <text x="355" y="549" text-anchor="middle" font-size="11" fill="#7E22CE">根因分析 / 计划修正</text>

  <rect x="480" y="515" width="170" height="42" fill="#F3E8FF" stroke="#A855F7" stroke-width="1.5" rx="6"/>
  <text x="565" y="533" text-anchor="middle" font-size="12" font-weight="bold" fill="#6B21A8">规则修正回写</text>
  <text x="565" y="549" text-anchor="middle" font-size="11" fill="#7E22CE">ISC Rules 更新</text>

  <rect x="690" y="515" width="160" height="42" fill="#F3E8FF" stroke="#A855F7" stroke-width="1.5" rx="6"/>
  <text x="770" y="533" text-anchor="middle" font-size="12" font-weight="bold" fill="#6B21A8">能力锚点更新</text>
  <text x="770" y="549" text-anchor="middle" font-size="11" fill="#7E22CE">Capability Anchor</text>

  <!-- Arrows L3→L4 -->
  <line x1="307" y1="428" x2="145" y2="515" stroke="#A855F7" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <line x1="482" y1="428" x2="355" y2="515" stroke="#A855F7" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <line x1="657" y1="428" x2="565" y2="515" stroke="#A855F7" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <line x1="805" y1="428" x2="770" y2="515" stroke="#A855F7" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- Feedback Loop arrows back up -->
  <path d="M 145 557 Q 20 620 20 260 Q 20 150 60 135" fill="none" stroke="#A855F7" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arrowPurple)"/>
  <path d="M 565 557 Q 870 610 870 130 Q 870 100 740 115" fill="none" stroke="#A855F7" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowPurple)"/>

  <!-- Bottom labels -->
  <text x="25" y="590" font-size="10" fill="#A855F7" font-style="italic">↑ AEO质量反馈→L2治理</text>
  <text x="680" y="590" font-size="10" fill="#A855F7" font-style="italic">规则修正→L1配置层 ↑</text>

  <!-- Legend -->
  <rect x="30" y="610" width="840" height="60" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1" rx="6"/>
  <text x="50" y="628" font-size="11" font-weight="bold" fill="#475569">图例</text>
  <rect x="90" y="618" width="16" height="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="112" y="628" font-size="10" fill="#1D4ED8">L1 感知输入</text>
  <rect x="195" y="618" width="16" height="10" fill="#DCFCE7" stroke="#22C55E" stroke-width="1"/>
  <text x="217" y="628" font-size="10" fill="#14532D">L2 治理决策</text>
  <rect x="300" y="618" width="16" height="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="322" y="628" font-size="10" fill="#92400E">L3 执行能力</text>
  <rect x="405" y="618" width="16" height="10" fill="#F3E8FF" stroke="#A855F7" stroke-width="1"/>
  <text x="427" y="628" font-size="10" fill="#6B21A8">L4 反馈进化</text>
  <line x1="90" y1="648" x2="120" y2="648" stroke="#475569" stroke-width="2" marker-end="url(#arrowGrey)"/>
  <text x="127" y="652" font-size="10" fill="#475569">主链路流向</text>
  <line x1="220" y1="648" x2="250" y2="648" stroke="#475569" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrowGrey)"/>
  <text x="257" y="652" font-size="10" fill="#475569">反馈/进化回路</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3B82F6"/>
    </marker>
    <marker id="arrowLBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#93C5FD"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22C55E"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#F59E0B"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#A855F7"/>
    </marker>
    <marker id="arrowGrey" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
  </defs>
</svg>
