  <rect x="30" y="340" width="840" height="130" fill="#FFF7ED" stroke="#F59E0B" stroke-width="1.5" rx="8"/>
  <text x="50" y="360" font-size="12" font-weight="bold" fill="#B45309">L3 · 执行与能力层</text>

  <rect x="60" y="368" width="145" height="60" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5" rx="6"/>
  <text x="132" y="393" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400E">Handlers/Pipeline</text>
  <text x="132" y="411" text-anchor="middle" font-size="11" fill="#B45309">工具调用 / 任务执行</text>

  <rect x="235" y="368" width="145" height="60" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5" rx="6"/>
  <text x="307" y="393" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400E">Skills执行面</text>
  <text x="307" y="411" text-anchor="middle" font-size="11" fill="#B45309">CRAS/SEEF/LEP</text>

  <rect x="410" y="368" width="145" height="60" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5" rx="6"/>
  <text x="482" y="393" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400E">Monitor/观测</text>
  <text x="482" y="411" text-anchor="middle" font-size="11" fill="#B45309">实时指标 / 告警</text>

  <rect x="585" y="368" width="145" height="60" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5" rx="6"/>
  <text x="657" y="393" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400E">日报/审计</text>
  <text x="657" y="411" text-anchor="middle" font-size="11" fill="#B45309">Reports / 风险记录</text>

  <rect x="760" y="368" width="90" height="60" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5" rx="6"/>
  <text x="805" y="390" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400E">EvoMap</text>
  <text x="805" y="408" text-anchor="middle" font-size="11" fill="#B45309">外部发布</text>

  <!-- Arrows L2→L3 -->
  <line x1="470" y1="288" x2="307" y2="368" stroke="#F59E0B" stroke-width="2.5" marker-end="url(#arrowOrange)"/>
  <!-- Arrows L3 internal -->
  <line x1="205" y1="398" x2="233" y2="398" stroke="#F59E0B" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <line x1="380" y1="398" x2="408" y2="398" stroke="#F59E0B" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <line x1="555" y1="398" x2="583" y2="398" stroke="#F59E0B" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <line x1="730" y1="398" x2="758" y2="398" stroke="#F59E0B" stroke-width="2" marker-end="url(#arrowOrange)"/>

