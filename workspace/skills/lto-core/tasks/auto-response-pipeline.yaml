id: auto-response-pipeline
intent: "系统质量与安全问题自动响应管道"
version: "1.0.0"

# ─── Day3-Gap2 重塑标记 ───
# 状态: RESHAPED → 事件驱动主路径
# 新配置: skills/lto-core/config/cron/auto-response-pipeline.yaml
# 事件路由: evolver.insight.detected / cras.insight.critical → Dispatcher → auto-response-handler
# 本文件保留为工作流定义参考，实际触发已迁移到 EventBus + Dispatcher
# reshaped_at: 2026-03-06

triggers:
  - type: event
    source: evolver.insight.detected
    condition: "insight.category in ['security', 'quality']"
  - type: event
    source: cras.insight.critical
    condition: "insight.impact >= 0.8"
  - type: conditional
    condition: "system.metric.threshold_exceeded"

workflow:
  nodes:
    - id: classify-issue
      action: seef.discoverer.classify
      params:
        source: "{{trigger.source}}"
        data: "{{trigger.data}}"
      
    - id: assess-impact
      action: seef.evaluator.assess
      dependsOn: [classify-issue]
      params:
        issueId: "{{classify-issue.output.id}}"
        scope: "{{classify-issue.output.scope}}"
      
    - id: council-check
      action: lto.internal.checkEscalation
      dependsOn: [assess-impact]
      params:
        impact: "{{assess-impact.output.impact}}"
        severity: "{{assess-impact.output.severity}}"
      
    - id: council-deliberate
      action: council-of-seven.deliberate
      dependsOn: [council-check]
      condition: "council-check.output.escalate == true"
      params:
        topic: "自动响应规则升级"
        context: "{{assess-impact.output}}"
      requiresConfirmation: true
      
    - id: auto-fix
      action: seef.optimizer.fix
      dependsOn: [assess-impact]
      condition: "assess-impact.output.autoFixable == true AND council-check.output.escalate == false"
      params:
        issueId: "{{assess-impact.output.id}}"
        strategy: "{{assess-impact.output.recommendedFix}}"
      retry:
        max: 3
        backoff: exponential
      
    - id: verify-fix
      action: seef.validator.verify
      dependsOn: [auto-fix]
      params:
        fixId: "{{auto-fix.output.fixId}}"
        testSuite: "{{assess-impact.output.testSuite}}"
      
    - id: global-align
      action: seef.aligner.align
      dependsOn: [verify-fix]
      params:
        changeSet: "{{verify-fix.output.changes}}"
        targetSystems: ["isc", "cras", "seef", "cto"]
      
    - id: record-event
      action: seef.recorder.record
      dependsOn: [global-align]
      params:
        eventType: "auto_response_completed"
        data: "{{global-align.output}}"
      
    - id: notify-user
      action: notification.send
      dependsOn: [record-event]
      params:
        channel: "feishu"
        template: "auto_response_summary"
        data: "{{record-event.output.summary}}"

constraints:
  - standard: rule.auto_response.security_quality
    operator: required
    severity: error
  - standard: security.vulnerability.scan
    threshold: 0
    severity: critical

policies:
  escalation:
    - condition: "impact.scope == 'system_wide'"
      action: "trigger_council"
    - condition: "severity == 'critical'"
      action: "trigger_council"
    - condition: "newPattern == true"
      action: "trigger_council"
  
  autoFix:
    - condition: "confidence > 0.9 AND blastRadius < 5"
      action: "auto_execute"
    - condition: "confidence > 0.7 AND blastRadius < 10"
      action: "suggest_with_preview"
    - condition: "confidence <= 0.7 OR blastRadius >= 10"
      action: "manual_review"

resources:
  timeout: 1800
  cpu: 4
  memory: 8G

telemetry:
  level: detailed
  metrics: [escalation_rate, auto_fix_rate, verification_success_rate]
