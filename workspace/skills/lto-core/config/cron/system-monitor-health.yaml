# ─────────────────────────────────────────────────────────────
# 系统健康检查 (扩展版 — 含 L3 指标维度)
#
# 重塑说明 (Day3 Gap-2):
#   旧模式: 只查 cpu/memory/disk/load/process
#   新模式: 扩展加入 L3 指标:
#     - EventBus 吞吐/积压
#     - Pipeline 成功率
#     - 熔断触发次数
#     - DecisionLog 异常
#     - FeatureFlag 变更
#   从 infrastructure/observability/metrics.js 读取 L3 指标
# ─────────────────────────────────────────────────────────────

id: system-monitor-health-check
name: 系统健康检查 (L3 扩展版)
version: "2.0.0"

schedule:
  kind: cron
  expr: "0 * * * *"
  timezone: Asia/Shanghai

trigger:
  kind: temporal

mode: event_driven_with_fallback
primary_channel: eventbus
primary_event: system.health.request

actions:
  - id: health-check-basic
    type: module
    module: system-monitor
    function: systemHealthCheck
    params:
      checks: [cpu, memory, disk, load, process]
      format: json

  - id: health-check-l3
    type: module
    module: system-monitor
    function: l3HealthCheck
    params:
      checks:
        - id: eventbus_throughput
          source: infrastructure/observability/metrics.js
          metrics: [events_emitted_total, events_processed_total, events_dropped_total]
          thresholds:
            events_dropped_rate: 0.05  # >5% 丢弃率告警

        - id: eventbus_backlog
          source: infrastructure/event-bus/bus-adapter.js
          method: stats
          thresholds:
            backlog_count: 100  # 积压超过100条告警

        - id: pipeline_success_rate
          source: infrastructure/observability/metrics.js
          metrics: [pipeline_runs_total, dispatch_success, dispatch_failed]
          thresholds:
            success_rate_min: 0.90  # 成功率低于90%告警

        - id: circuit_breaker
          source: infrastructure/observability/metrics.js
          metrics: [pipeline_breaker_trips]
          thresholds:
            trips_per_hour: 3  # 每小时超过3次熔断告警

        - id: decision_log_anomaly
          source: infrastructure/decision-log/decision-logger.js
          method: summarize
          params:
            since: "-1h"
          thresholds:
            degradation_rate: 0.10  # >10% 低信心决策告警
            avg_confidence_min: 0.6  # 平均信心低于0.6告警

        - id: feature_flag_changes
          source: infrastructure/config/feature-flags.js
          method: getAll
          check: diff_from_defaults
          severity: info  # 仅记录，不告警

      format: json

  - id: emit-health-event
    type: event
    event_type: system.health
    payload:
      source: cron-health-check
      basic: "{{health-check-basic.output}}"
      l3: "{{health-check-l3.output}}"

  - id: notify-if-warning
    type: condition
    condition: "{{health-check-basic.overall}} != 'healthy' OR {{health-check-l3.overall}} != 'healthy'"
    then:
      - type: notify
        channel: feishu
        message: |
          ⚠️ 系统健康检查异常

          === 基础指标 ===
          状态: {{health-check-basic.overall}}
          CPU: {{health-check-basic.cpu.usage}}% ({{health-check-basic.cpu.status}})
          内存: {{health-check-basic.memory.usage}}% ({{health-check-basic.memory.status}})
          磁盘: {{health-check-basic.disk.usage}}% ({{health-check-basic.disk.status}})

          === L3 指标 ===
          EventBus 吞吐: 发射{{health-check-l3.eventbus.emitted}} / 处理{{health-check-l3.eventbus.processed}} / 丢弃{{health-check-l3.eventbus.dropped}}
          Pipeline 成功率: {{health-check-l3.pipeline.success_rate}}%
          熔断触发: {{health-check-l3.breaker.trips}}次
          决策日志: 平均信心{{health-check-l3.decision.avg_confidence}}, 降级{{health-check-l3.decision.degradation_count}}条
          FeatureFlag 变更: {{health-check-l3.flags.changes_from_default}}项

          时间: {{health-check-basic.timestamp}}

resources:
  timeout: 60
  cpu: 1
  memory: 512M

telemetry:
  level: detailed
  metrics:
    - health_check_duration_ms
    - l3_checks_passed
    - l3_checks_warned
    - l3_checks_failed

metadata:
  author: system
  priority: high
  category: monitoring
  description: "系统健康检查 — 基础指标 + L3 EventBus/Pipeline/Decision/FeatureFlag 指标"
  reshaped_at: "2026-03-06"
  reshaped_from: "skills/lto-core/tasks/system-monitor-health.yaml"
