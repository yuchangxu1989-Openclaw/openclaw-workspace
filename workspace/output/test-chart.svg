<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; text-anchor: middle; }
      .axis { font-family: Arial, sans-serif; font-size: 12px; }
      .grid { stroke: #e0e0e0; stroke-width: 1; }
      .axis-line { stroke: #333; stroke-width: 2; }
      .legend { font-family: Arial, sans-serif; font-size: 12px; }
    </style>
  </defs>
  
  <!-- 背景 -->
  <rect width="800" height="400" fill="#fafafa"/>
  
  <!-- 标题 -->
  <text x="400" y="25" class="title" fill="#333">AEO 效果趋势图</text>
  
  <!-- 网格 -->
  <g class="grid">
    <line x1="60" y1="40" x2="760" y2="40"/>
    <line x1="60" y1="100" x2="760" y2="100"/>
    <line x1="60" y1="160" x2="760" y2="160"/>
    <line x1="60" y1="220" x2="760" y2="220"/>
    <line x1="60" y1="280" x2="760" y2="280"/>
    <line x1="60" y1="340" x2="760" y2="340"/>
  </g>
  
  <!-- 坐标轴 -->
  <line x1="60" y1="40" x2="60" y2="340" class="axis-line"/>
  <line x1="60" y1="340" x2="760" y2="340" class="axis-line"/>
  
  <!-- Y轴标签 -->
  <g class="axis">
    <text x="50" y="44" text-anchor="end" fill="#666">89%</text>
    <text x="50" y="104" text-anchor="end" fill="#666">85%</text>
    <text x="50" y="164" text-anchor="end" fill="#666">81%</text>
    <text x="50" y="224" text-anchor="end" fill="#666">77%</text>
    <text x="50" y="284" text-anchor="end" fill="#666">73%</text>
    <text x="50" y="344" text-anchor="end" fill="#666">68%</text>
  </g>
  <!-- 数据集: 综合得分 -->
  <path d="M 60,67.27272727272731L 235,107.39543779822208L 410,93.08030027581086L 585,315.206611570248L 760,154.72794009662329" fill="none" stroke="#2196F3" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
  <circle cx="60" cy="67.27272727272731" r="4" fill="#2196F3" stroke="white" stroke-width="2"/>
  <circle cx="235" cy="107.39543779822208" r="4" fill="#2196F3" stroke="white" stroke-width="2"/>
  <circle cx="410" cy="93.08030027581086" r="4" fill="#2196F3" stroke="white" stroke-width="2"/>
  <circle cx="585" cy="315.206611570248" r="4" fill="#2196F3" stroke="white" stroke-width="2"/>
  <circle cx="760" cy="154.72794009662329" r="4" fill="#2196F3" stroke="white" stroke-width="2"/>
  
  <!-- X轴标签 -->
  <g class="axis">
    <text x="60" y="360" text-anchor="middle" fill="#666">2/22</text>
    <text x="235" y="360" text-anchor="middle" fill="#666">2/23</text>
    <text x="410" y="360" text-anchor="middle" fill="#666">2/24</text>
    <text x="585" y="360" text-anchor="middle" fill="#666">2/25</text>
    <text x="760" y="360" text-anchor="middle" fill="#666">2/26</text>
  </g>
  
  <!-- 图例 -->
  <g class="legend">
    <line x1="360" y1="380" x2="380" y2="380" stroke="#2196F3" stroke-width="3"/>
    <text x="385" y="384" fill="#333">综合得分</text>
  </g>
