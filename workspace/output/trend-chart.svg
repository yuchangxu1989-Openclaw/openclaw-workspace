<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; text-anchor: middle; }
      .axis { font-family: Arial, sans-serif; font-size: 12px; }
      .grid { stroke: #e0e0e0; stroke-width: 1; }
      .axis-line { stroke: #333; stroke-width: 2; }
      .legend { font-family: Arial, sans-serif; font-size: 12px; }
    </style>
  </defs>
  
  <!-- 背景 -->
  <rect width="800" height="400" fill="#fafafa"/>
  
  <!-- 标题 -->
  <text x="400" y="25" class="title" fill="#333">AEO 效果趋势图</text>
  
  <!-- 网格 -->
  <g class="grid">
    <line x1="60" y1="40" x2="760" y2="40"/>
    <line x1="60" y1="100" x2="760" y2="100"/>
    <line x1="60" y1="160" x2="760" y2="160"/>
    <line x1="60" y1="220" x2="760" y2="220"/>
    <line x1="60" y1="280" x2="760" y2="280"/>
    <line x1="60" y1="340" x2="760" y2="340"/>
  </g>
  
  <!-- 坐标轴 -->
  <line x1="60" y1="40" x2="60" y2="340" class="axis-line"/>
  <line x1="60" y1="340" x2="760" y2="340" class="axis-line"/>
  
  <!-- Y轴标签 -->
  <g class="axis">
    <text x="50" y="44" text-anchor="end" fill="#666">81%</text>
    <text x="50" y="104" text-anchor="end" fill="#666">77%</text>
    <text x="50" y="164" text-anchor="end" fill="#666">74%</text>
    <text x="50" y="224" text-anchor="end" fill="#666">70%</text>
    <text x="50" y="284" text-anchor="end" fill="#666">67%</text>
    <text x="50" y="344" text-anchor="end" fill="#666">63%</text>
  </g>
  <!-- 数据集: AI效果 -->
  <path d="M 60,130.44613206451552L 235,200.53667738232602L 410,169.12278942238225L 585,240.37583997387853L 760,305.5903397086835" fill="none" stroke="#2196F3" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
  <circle cx="60" cy="130.44613206451552" r="4" fill="#2196F3" stroke="white" stroke-width="2"/>
  <circle cx="235" cy="200.53667738232602" r="4" fill="#2196F3" stroke="white" stroke-width="2"/>
  <circle cx="410" cy="169.12278942238225" r="4" fill="#2196F3" stroke="white" stroke-width="2"/>
  <circle cx="585" cy="240.37583997387853" r="4" fill="#2196F3" stroke="white" stroke-width="2"/>
  <circle cx="760" cy="305.5903397086835" r="4" fill="#2196F3" stroke="white" stroke-width="2"/>
  <!-- 数据集: 功能质量 -->
  <path d="M 60,67.27272727272737L 235,132.7063050466253L 410,191.97763663671233L 585,315.20661157024796L 760,271.6785686210318" fill="none" stroke="#4CAF50" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
  <circle cx="60" cy="67.27272727272737" r="4" fill="#4CAF50" stroke="white" stroke-width="2"/>
  <circle cx="235" cy="132.7063050466253" r="4" fill="#4CAF50" stroke="white" stroke-width="2"/>
  <circle cx="410" cy="191.97763663671233" r="4" fill="#4CAF50" stroke="white" stroke-width="2"/>
  <circle cx="585" cy="315.20661157024796" r="4" fill="#4CAF50" stroke="white" stroke-width="2"/>
  <circle cx="760" cy="271.6785686210318" r="4" fill="#4CAF50" stroke="white" stroke-width="2"/>
  
  <!-- X轴标签 -->
  <g class="axis">
    <text x="60" y="360" text-anchor="middle" fill="#666">2/22</text>
    <text x="235" y="360" text-anchor="middle" fill="#666">2/23</text>
    <text x="410" y="360" text-anchor="middle" fill="#666">2/24</text>
    <text x="585" y="360" text-anchor="middle" fill="#666">2/25</text>
    <text x="760" y="360" text-anchor="middle" fill="#666">2/26</text>
  </g>
  
  <!-- 图例 -->
  <g class="legend">
    <line x1="320" y1="380" x2="340" y2="380" stroke="#2196F3" stroke-width="3"/>
    <text x="345" y="384" fill="#333">AI效果</text>
    <line x1="420" y1="380" x2="440" y2="380" stroke="#4CAF50" stroke-width="3"/>
    <text x="445" y="384" fill="#333">功能质量</text>
  </g>
</svg>