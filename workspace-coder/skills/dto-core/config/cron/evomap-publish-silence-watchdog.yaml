id: evomap-publish-silence-watchdog
name: 发布静默巡检与自动补发
version: "1.0.0"

mode: event_driven_with_fallback
primary_channel: eventbus
primary_event: evomap.publish.silence.check

triggers:
  - type: cron
    spec: "*/15 * * * *"
    timezone: Asia/Shanghai
    purpose: fallback_sweep

fallback_sweep:
  description: "每 15 分钟巡检最近 72 小时的发布请求与成功发布事件，发现静默窗口后自动补发"
  check_window_hours: 72
  threshold_minutes: 180
  action_on_silence: emit_and_replay
  max_replay_per_run: 20
  dedup: true

workflow:
  handler: publish-silence-watchdog
  params:
    thresholdMinutes: 180
    lookbackHours: 72
    autoReplayLimit: 20
    alertCooldownMinutes: 30

constraints:
  - standard: rule.publish.silence.fail_closed
    operator: required
    severity: error

resources:
  timeout: 120
  cpu: 1
  memory: 512M

telemetry:
  level: standard
  metrics:
    - publish_silence_pending_windows
    - publish_silence_auto_replay_count
    - publish_silence_replay_failed_count
    - publish_silence_scan_duration_ms

metadata:
  author: system
  priority: high
  category: publish-ops
  description: "发布静默窗口巡检；主路径 EventBus 触发，Cron 负责兜底补扫"
  created_at: "2026-03-08"
