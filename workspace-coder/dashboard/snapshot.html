<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw Agent Dashboard</title>
<style>
  /* ── Reset & Base ─────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --orange: #db6d28;
    --purple: #bc8cff;
    --radius: 8px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
  }
  html { font-size: 14px; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 32px;
    line-height: 1.5;
  }

  /* ── Header ────────────────────────────────────────── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .header h1 {
    font-size: 1.6rem;
    font-weight: 700;
    color: #f0f6fc;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header h1 .logo { font-size: 1.8rem; }
  .header .meta {
    font-size: 0.85rem;
    color: var(--text-dim);
    text-align: right;
  }
  .header .meta .live-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    margin-right: 4px;
    animation: pulse 2s ease infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ── Section Titles ────────────────────────────────── */
  .section-title {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    margin: 24px 0 12px 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── Agent Summary Bar ─────────────────────────────── */
  .agents-bar {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .agent-card {
    flex: 1;
    min-width: 260px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color 0.2s;
  }
  .agent-card:hover { border-color: var(--accent); }
  .agent-avatar {
    width: 42px; height: 42px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    flex-shrink: 0;
  }
  .agent-avatar.active   { background: rgba(63,185,80,0.15); }
  .agent-avatar.idle     { background: rgba(139,148,158,0.15); }
  .agent-info { flex: 1; min-width: 0; }
  .agent-info .name {
    font-weight: 600;
    color: #f0f6fc;
    font-size: 0.95rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .agent-info .model {
    font-size: 0.75rem;
    color: var(--text-dim);
    font-family: 'Menlo', 'Consolas', monospace;
  }
  .agent-info .task-hint {
    font-size: 0.8rem;
    color: var(--accent);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 0.7rem;
    text-transform: uppercase;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 3px 8px;
    border-radius: 12px;
    white-space: nowrap;
  }
  .status-badge.active  { background: rgba(63,185,80,0.15);  color: var(--green); }
  .status-badge.idle    { background: rgba(139,148,158,0.15); color: var(--text-dim); }

  /* ── Task Table ────────────────────────────────────── */
  .task-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 8px;
  }
  .task-table th {
    text-align: left;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
  }
  .task-table td {
    padding: 10px 12px;
    border-bottom: 1px solid rgba(48,54,61,0.5);
    vertical-align: middle;
  }
  .task-table tr:last-child td { border-bottom: none; }
  .task-table tbody tr {
    transition: background 0.15s;
  }
  .task-table tbody tr:hover {
    background: rgba(88,166,255,0.04);
  }

  /* Task status pills */
  .task-status {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 0.78rem;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 12px;
    white-space: nowrap;
  }
  .task-status.running  { background: rgba(88,166,255,0.12); color: var(--accent); }
  .task-status.done     { background: rgba(63,185,80,0.12);  color: var(--green); }
  .task-status.error    { background: rgba(248,81,73,0.12);  color: var(--red); }
  .task-status.abnormal { background: rgba(219,109,40,0.12); color: var(--orange); }
  .task-status.queued   { background: rgba(139,148,158,0.12); color: var(--text-dim); }

  .task-title {
    font-weight: 500;
    color: #f0f6fc;
    max-width: 420px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .task-agent {
    font-size: 0.8rem;
    color: var(--text-dim);
  }
  .task-time {
    font-size: 0.78rem;
    color: var(--text-dim);
    font-family: 'Menlo', 'Consolas', monospace;
    white-space: nowrap;
  }
  .task-tags {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }
  .task-tag {
    font-size: 0.65rem;
    padding: 1px 6px;
    border-radius: 6px;
    background: rgba(188,140,255,0.1);
    color: var(--purple);
    font-weight: 500;
  }

  /* ── Footer Summary ────────────────────────────────── */
  .footer-summary {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-top: 8px;
    padding: 16px 0;
    border-top: 1px solid var(--border);
  }
  .summary-card {
    flex: 1;
    min-width: 180px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    text-align: center;
  }
  .summary-card .num {
    font-size: 2rem;
    font-weight: 700;
    line-height: 1.1;
  }
  .summary-card .num.green  { color: var(--green); }
  .summary-card .num.red    { color: var(--red); }
  .summary-card .num.orange { color: var(--orange); }
  .summary-card .num.blue   { color: var(--accent); }
  .summary-card .label {
    font-size: 0.78rem;
    color: var(--text-dim);
    margin-top: 4px;
  }

  /* ── Hidden (done >10min) ──────────────────────────── */
  .task-table tr.hidden-done {
    display: none;
  }
  body.show-all .task-table tr.hidden-done {
    display: table-row;
    opacity: 0.45;
  }

  .toggle-done {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.78rem;
    color: var(--text-dim);
    cursor: pointer;
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 12px;
    transition: border-color 0.2s, color 0.2s;
  }
  .toggle-done:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── Responsive ────────────────────────────────────── */
  @media (max-width: 700px) {
    body { padding: 12px 16px; }
    .agent-card { min-width: 100%; }
    .task-title { max-width: 200px; }
  }

  /* ── Print / Screenshot ────────────────────────────── */
  @media print {
    body { background: #fff; color: #1f2328; padding: 16px; }
    .agent-card, .summary-card { border-color: #d1d9e0; background: #f6f8fa; }
    .task-table td, .task-table th { border-color: #d1d9e0; }
    .header { border-color: #d1d9e0; }
    .section-title::after { background: #d1d9e0; }
  }
</style>

// ── Helpers ───────────────────────────────────────────────
function relTime(isoStr) {
  if (!isoStr) return '—';
  const d = new Date(isoStr);
  const diff = Date.now() - d.getTime();
  if (diff < 0) return 'just now';
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ${mins % 60}m ago`;
  const days = Math.floor(hrs / 24);
  return `${days}d ago`;
}

function shortTime(isoStr) {
  if (!isoStr) return '—';
  const d = new Date(isoStr);
  return d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
}

function statusIcon(s) {
  const m = {
    running: '⟳', done: '✓', error: '✗', abnormal: '⚠', queued: '◦'
  };
  return m[s] || '?';
}

function agentEmoji(id) {
  // Use SVG-safe text symbols for headless screenshot compatibility
  const m = { main: '◈', coder: '⌘', reviewer: '⊙', publisher: '▲' };
  return m[id] || '●';
}

function minutesSince(isoStr) {
  if (!isoStr) return Infinity;
  return (Date.now() - new Date(isoStr).getTime()) / 60000;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Render ────────────────────────────────────────────────
function render(data) {
  const now = new Date();
  const genAt = data.generatedAt ? new Date(data.generatedAt) : now;
  const agents = data.agents || [];
  const tasks = data.tasks || [];

  // Sort tasks: running/queued first, then by updatedAt newest-first
  const statusOrder = { running: 0, queued: 1, abnormal: 2, error: 3, done: 4 };
  const sorted = [...tasks].sort((a, b) => {
    const sa = statusOrder[a.status] ?? 99;
    const sb = statusOrder[b.status] ?? 99;
    if (sa !== sb) return sa - sb;
    return new Date(b.updatedAt || 0) - new Date(a.updatedAt || 0);
  });

  // Counts
  const running = tasks.filter(t => t.status === 'running').length;
  const done    = tasks.filter(t => t.status === 'done').length;
  const errors  = tasks.filter(t => t.status === 'error' || t.status === 'abnormal').length;
  const total   = tasks.length;
  const hiddenDone = tasks.filter(t => t.status === 'done' && minutesSince(t.completedAt || t.updatedAt) > 10).length;

  let html = '';

  // ── Header
  html += `
  <div class="header">
    <h1><span class="logo" style="color:var(--accent)">⬡</span> OpenClaw Agent Dashboard</h1>
    <div class="meta">
      <div><span class="live-dot"></span> Live View</div>
      <div>Generated ${genAt.toLocaleString('en-GB', { hour12: false })}</div>
    </div>
  </div>`;

  // ── Agent Summary Bar
  html += `<div class="section-title">Agents Online</div>`;
  html += `<div class="agents-bar">`;
  for (const ag of agents) {
    const cls = ag.status === 'active' ? 'active' : 'idle';
    html += `
    <div class="agent-card">
      <div class="agent-avatar ${cls}">${agentEmoji(ag.id)}</div>
      <div class="agent-info">
        <div class="name">${escHtml(ag.label || ag.id)}</div>
        <div class="model">${escHtml(ag.model || '—')}</div>
        ${ag.currentTask ? `<div class="task-hint">${escHtml(ag.currentTask)}</div>` : ''}
      </div>
      <span class="status-badge ${cls}">${cls === 'active' ? '● Active' : '○ Idle'}</span>
    </div>`;
  }
  html += `</div>`;

  // ── Current Tasks (newest-first, done hidden after 10 min)
  html += `
  <div class="section-title">
    Task Queue
    <button class="toggle-done" onclick="document.body.classList.toggle('show-all');this.textContent=document.body.classList.contains('show-all')?'Hide old done':'Show ${hiddenDone} hidden done'">
      Show ${hiddenDone} hidden done
    </button>
  </div>`;

  html += `
  <table class="task-table">
    <thead>
      <tr>
        <th style="width:36px"></th>
        <th>Task</th>
        <th>Agent</th>
        <th>Status</th>
        <th>Updated</th>
        <th>Tags</th>
      </tr>
    </thead>
    <tbody>`;

  for (const t of sorted) {
    const isDoneOld = t.status === 'done' && minutesSince(t.completedAt || t.updatedAt) > 10;
    const rowClass = isDoneOld ? 'hidden-done' : '';
    const tags = (t.tags || []).map(tg => `<span class="task-tag">${escHtml(tg)}</span>`).join('');
    html += `
      <tr class="${rowClass}">
        <td style="text-align:center;font-size:1rem">${statusIcon(t.status)}</td>
        <td><span class="task-title" title="${escHtml(t.title)}">${escHtml(t.title)}</span></td>
        <td><span class="task-agent">${agentEmoji(t.agent)} ${escHtml(t.agent || '—')}</span></td>
        <td><span class="task-status ${t.status}">${statusIcon(t.status)} ${escHtml(t.status)}</span></td>
        <td><span class="task-time" title="${escHtml(t.updatedAt || '')}">${relTime(t.updatedAt)}</span></td>
        <td><div class="task-tags">${tags}</div></td>
      </tr>`;
  }

  html += `
    </tbody>
  </table>`;

  // ── Footer Summary
  html += `<div class="section-title">Summary</div>`;
  html += `<div class="footer-summary">`;
  html += `
    <div class="summary-card">
      <div class="num blue">${running}</div>
      <div class="label">Running</div>
    </div>
    <div class="summary-card">
      <div class="num green">${done}</div>
      <div class="label">Done</div>
    </div>
    <div class="summary-card">
      <div class="num ${errors > 0 ? 'red' : 'orange'}">${errors}</div>
      <div class="label">Abnormal / Error</div>
    </div>
    <div class="summary-card">
      <div class="num" style="color:var(--text)">${total}</div>
      <div class="label">Total Tasks</div>
    </div>`;
  html += `</div>`;

  document.getElementById('app').innerHTML = html;
}

// ── Boot ──────────────────────────────────────────────────
(async function boot() {
  if (INLINE_DATA) {
    render(INLINE_DATA);
    return;
  }
  try {
    const resp = await fetch('task-state.json');
    if (resp.ok) {
      render(await resp.json());
    } else {
      document.getElementById('app').textContent = 'Failed to load task-state.json';
    }
  } catch (e) {
    document.getElementById('app').textContent = 'Error: ' + e.message;
  }
})();
</script>
