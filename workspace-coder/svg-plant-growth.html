<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌱 SVG 植物生长动画</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; background: linear-gradient(180deg, #87CEEB 0%, #E0F7FA 40%, #A5D6A7 70%, #6D4C41 100%);
    font-family: 'Segoe UI', sans-serif; overflow: hidden;
  }
  h1 { color: #2E7D32; text-shadow: 1px 1px 2px rgba(0,0,0,.15); margin-bottom: 12px; font-size: 1.6rem; }
  .controls { margin-bottom: 16px; display: flex; gap: 12px; }
  .controls button {
    padding: 8px 20px; border: none; border-radius: 20px; cursor: pointer;
    font-size: .95rem; font-weight: 600; transition: transform .15s, box-shadow .15s;
  }
  .controls button:hover { transform: scale(1.06); box-shadow: 0 4px 12px rgba(0,0,0,.2); }
  #btnGrow   { background: #4CAF50; color: #fff; }
  #btnReset  { background: #FF7043; color: #fff; }
  svg { filter: drop-shadow(0 4px 8px rgba(0,0,0,.12)); }

  /* ---------- animations ---------- */
  @keyframes sway {
    0%, 100% { transform: rotate(0deg); }
    25%  { transform: rotate(2deg); }
    75%  { transform: rotate(-2deg); }
  }
  .sway { animation: sway 3s ease-in-out infinite; transform-origin: bottom center; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes twinkle {
    0%, 100% { opacity: .3; }
    50%      { opacity: 1; }
  }
  .particle { animation: twinkle 1.8s ease-in-out infinite; }
</style>
</head>
<body>

<h1>🌱 SVG 植物生长动画</h1>
<div class="controls">
  <button id="btnGrow">🌿 开始生长</button>
  <button id="btnReset">🔄 重置</button>
</div>

<svg id="scene" width="480" height="520" viewBox="0 0 480 520">
  <defs>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFF176"/>
      <stop offset="100%" stop-color="#FFD54F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="potGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#A1887F"/>
      <stop offset="100%" stop-color="#6D4C41"/>
    </linearGradient>
    <linearGradient id="stemGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"  stop-color="#33691E"/>
      <stop offset="100%" stop-color="#7CB342"/>
    </linearGradient>
    <linearGradient id="soilGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#5D4037"/>
      <stop offset="100%" stop-color="#3E2723"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- sky / sun -->
  <circle cx="400" cy="70" r="60" fill="url(#sunGlow)" opacity="0.7"/>
  <circle cx="400" cy="70" r="28" fill="#FDD835"/>

  <!-- ground -->
  <ellipse cx="240" cy="460" rx="220" ry="50" fill="#8D6E63" opacity="0.3"/>

  <!-- pot -->
  <path d="M180 400 L190 460 L290 460 L300 400 Z" fill="url(#potGrad)" stroke="#5D4037" stroke-width="2"/>
  <rect x="175" y="392" width="130" height="14" rx="4" fill="#8D6E63" stroke="#5D4037" stroke-width="1.5"/>
  <ellipse cx="240" cy="410" rx="52" ry="10" fill="url(#soilGrad)"/>

  <!-- plant group — everything grows from here -->
  <g id="plant" class="sway">
    <!-- main stem (grows upward) -->
    <line id="stem" x1="240" y1="400" x2="240" y2="400"
          stroke="url(#stemGrad)" stroke-width="6" stroke-linecap="round"/>

    <!-- branches / leaves / flowers — injected by JS -->
    <g id="branches"></g>
    <g id="flowers"></g>
    <g id="particles"></g>
  </g>
</svg>

<script>
(function () {
  /* ---- refs ---- */
  const stem      = document.getElementById('stem');
  const branches  = document.getElementById('branches');
  const flowers   = document.getElementById('flowers');
  const particles = document.getElementById('particles');
  const btnGrow   = document.getElementById('btnGrow');
  const btnReset  = document.getElementById('btnReset');

  const BASE_Y = 400;      // pot top
  let   tipY   = BASE_Y;   // current stem tip
  let   growing = false;
  let   phase   = 0;        // 0-idle 1-stem 2-branch 3-flower 4-done
  let   raf     = null;
  let   branchIdx = 0;

  /* ---- helpers ---- */
  function lerp (a, b, t) { return a + (b - a) * t; }
  function rand (lo, hi) { return Math.random() * (hi - lo) + lo; }

  function createLeaf (cx, cy, angle, size, delay) {
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('transform', `translate(${cx},${cy}) rotate(${angle})`);
    g.style.opacity = '0';
    g.style.transition = `opacity .6s ${delay}ms, transform .6s ${delay}ms`;
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    const s = size;
    path.setAttribute('d', `M0,0 Q${s*0.6},${-s*0.8} ${s*0.2},${-s*1.4} Q${-s*0.2},${-s*0.7} 0,0`);
    path.setAttribute('fill', `hsl(${Math.round(rand(95,140))},${Math.round(rand(55,75))}%,${Math.round(rand(35,55))}%)`);
    path.setAttribute('stroke', '#33691E');
    path.setAttribute('stroke-width', '0.8');
    g.appendChild(path);
    // vein
    const vein = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    vein.setAttribute('x1', 0); vein.setAttribute('y1', 0);
    vein.setAttribute('x2', s * 0.15); vein.setAttribute('y2', -s * 0.9);
    vein.setAttribute('stroke', '#558B2F'); vein.setAttribute('stroke-width', '0.5');
    g.appendChild(vein);
    branches.appendChild(g);
    requestAnimationFrame(() => { g.style.opacity = '1'; });
    return g;
  }

  function createFlower (cx, cy, delay) {
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('transform', `translate(${cx},${cy})`);
    g.style.opacity = '0';
    g.style.transition = `opacity .8s ${delay}ms, transform .8s ${delay}ms`;
    const petalColors = ['#E91E63','#F06292','#FF80AB','#F48FB1','#CE93D8','#FFB74D','#FF7043'];
    const petalCount = Math.round(rand(5, 8));
    const r = rand(8, 14);
    for (let i = 0; i < petalCount; i++) {
      const a = (360 / petalCount) * i;
      const petal = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
      petal.setAttribute('cx', 0); petal.setAttribute('cy', -r * 0.6);
      petal.setAttribute('rx', r * 0.38); petal.setAttribute('ry', r * 0.7);
      petal.setAttribute('fill', petalColors[Math.floor(Math.random() * petalColors.length)]);
      petal.setAttribute('transform', `rotate(${a})`);
      petal.setAttribute('opacity', '0.88');
      g.appendChild(petal);
    }
    // centre
    const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    c.setAttribute('cx', 0); c.setAttribute('cy', 0);
    c.setAttribute('r', r * 0.3);
    c.setAttribute('fill', '#FDD835');
    g.appendChild(c);
    flowers.appendChild(g);
    requestAnimationFrame(() => { g.style.opacity = '1'; });
  }

  function createSparkle (cx, cy, delay) {
    const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    c.setAttribute('cx', cx + rand(-30, 30));
    c.setAttribute('cy', cy + rand(-20, 20));
    c.setAttribute('r', rand(1.5, 3));
    c.setAttribute('fill', '#FFEB3B');
    c.setAttribute('filter', 'url(#glow)');
    c.classList.add('particle');
    c.style.animationDelay = `${delay}ms`;
    particles.appendChild(c);
  }

  /* ---- growth phases ---- */
  const TARGET_Y   = 160;   // top of stem
  const GROW_SPEED = 1.2;   // px per frame
  const BRANCH_EVERY = 40;  // px interval for branches

  function tick () {
    if (!growing) return;

    if (phase === 1) {
      // grow stem
      tipY -= GROW_SPEED;
      stem.setAttribute('y2', tipY);

      // add branches at intervals
      const traveled = BASE_Y - tipY;
      const expectedBranches = Math.floor(traveled / BRANCH_EVERY);
      while (branchIdx < expectedBranches) {
        const by = BASE_Y - (branchIdx + 1) * BRANCH_EVERY;
        const side = branchIdx % 2 === 0 ? -1 : 1;
        createLeaf(240, by, side * rand(25, 60), rand(16, 28), 0);
        branchIdx++;
      }

      if (tipY <= TARGET_Y) {
        tipY = TARGET_Y;
        stem.setAttribute('y2', tipY);
        phase = 2;
        startFlowers();
      }
    }

    if (phase !== 4) raf = requestAnimationFrame(tick);
  }

  function startFlowers () {
    // add 3-5 flowers at top
    const count = Math.round(rand(3, 5));
    for (let i = 0; i < count; i++) {
      const fx = 240 + rand(-40, 40);
      const fy = TARGET_Y + rand(-20, 20);
      createFlower(fx, fy, i * 300);
    }
    // sparkles
    for (let i = 0; i < 12; i++) {
      createSparkle(240, TARGET_Y, i * 150);
    }
    phase = 4;
    growing = false;
    btnGrow.textContent = '✅ 完成!';
    btnGrow.disabled = true;
  }

  /* ---- controls ---- */
  btnGrow.addEventListener('click', () => {
    if (growing || phase === 4) return;
    growing = true;
    phase = 1;
    btnGrow.textContent = '🌿 生长中…';
    raf = requestAnimationFrame(tick);
  });

  btnReset.addEventListener('click', () => {
    growing = false;
    phase = 0;
    tipY = BASE_Y;
    branchIdx = 0;
    if (raf) cancelAnimationFrame(raf);
    stem.setAttribute('y2', BASE_Y);
    branches.innerHTML = '';
    flowers.innerHTML = '';
    particles.innerHTML = '';
    btnGrow.textContent = '🌿 开始生长';
    btnGrow.disabled = false;
  });
})();
</script>
</body>
</html>
